<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🔒 Блокировка ПК</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; }
        body { background: linear-gradient(145deg, #0a0f1c 0%, #101a2f 100%); min-height: 100vh; padding: 16px; color: #eef2ff; }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: rgba(18, 25, 45, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(71, 125, 255, 0.3);
            padding: 20px;
            margin-bottom: 20px;
        }
        h1 { font-size: 1.8rem; background: linear-gradient(135deg, #fff, #7aa2ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        h3 { margin-bottom: 12px; }
        button {
            background: linear-gradient(95deg, #2c3e8f, #1e2b5c);
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            font-size: 1rem;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        input {
            background: #0e1428;
            border: 1px solid #2d3a60;
            padding: 12px 16px;
            border-radius: 28px;
            color: white;
            width: 100%;
            margin-bottom: 12px;
            font-size: 1rem;
        }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .badge {
            background: #1f2b48;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
        }
        .badge-locked { background: #b2455a; }
        .badge-free { background: #2a6b4a; }
        .hidden { display: none; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #1e293b;
            border-left: 5px solid #5f7ef2;
            padding: 14px;
            border-radius: 60px;
            text-align: center;
            z-index: 2000;
            animation: slideUp 0.3s;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .log-item {
            background: #0b1022;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 8px;
            border-left: 3px solid #4caf50;
            font-size: 0.9rem;
        }
        .log-item.error { border-left-color: #f05454; }
        .log-time { opacity: 0.7; font-size: 0.75rem; margin-right: 8px; }
        .status-value {
            font-size: 1.4rem;
            font-weight: 700;
        }
        .status-value.free { color: #4caf50; }
        .status-value.locked { color: #f05454; }
        .row-buttons { display: flex; gap: 10px; }
        .row-buttons button { margin-top: 0; flex: 1; }
        @media (max-width: 480px) { .row-buttons { flex-direction: column; } }
        #logContainer { max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
<div class="container">
    <div class="flex-between">
        <h1>🔒 Блокировка ПК</h1>
        <div id="statusBadge" class="badge badge-free">✅ Свободен</div>
    </div>

    <!-- Карточка статуса -->
    <div class="card" id="statusCard">
        <div class="flex-between">
            <span>Текущий статус:</span>
            <span class="status-value free" id="statusValue">Загрузка...</span>
        </div>
        <small style="display:block; margin-top:6px; opacity:0.6;">Двойной клик по карточке – обновить вручную</small>
    </div>

    <!-- Управление -->
    <div class="card">
        <h3>⏱️ Заблокировать компьютер</h3>
        <div class="flex-between" style="margin-bottom:12px;">
            <label for="minutesInput" style="flex:1;">Время (минуты):</label>
            <input type="number" id="minutesInput" min="1" max="1440" value="60" style="width:100px; margin:0;">
        </div>
        <button id="blockBtn">🔒 Заблокировать</button>
    </div>

    <!-- Лог операций -->
    <div class="card">
        <h3>📋 Журнал событий</h3>
        <div id="logContainer">
            <div class="log-item"><span class="log-time">[Система]</span> Готов к работе</div>
        </div>
    </div>
</div>

<script>
    // ---------- КОНФИГУРАЦИЯ ----------
    const GITHUB_TOKEN = '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'; // НОВЫЙ ТОКЕН
    const REPO_OWNER = 'ShvezYT';
    const REPO_NAME = 'PCBLOCK';
    const FILE_PATH = 'pc.json';
    const BRANCH = 'main';
    const RAW_URL = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/${FILE_PATH}`;
    const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;

    // DOM
    const statusBadge = document.getElementById('statusBadge');
    const statusValue = document.getElementById('statusValue');
    const statusCard = document.getElementById('statusCard');
    const minutesInput = document.getElementById('minutesInput');
    const blockBtn = document.getElementById('blockBtn');
    const logContainer = document.getElementById('logContainer');

    // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
    function addLog(message, type = 'info') {
        const time = new Date().toLocaleTimeString();
        const div = document.createElement('div');
        div.className = `log-item${type === 'error' ? ' error' : ''}`;
        div.innerHTML = `<span class="log-time">[${time}]</span> ${message}`;
        logContainer.appendChild(div);
        logContainer.scrollTop = logContainer.scrollHeight;
        if (logContainer.children.length > 50) {
            logContainer.removeChild(logContainer.firstChild);
        }
    }

    function showToast(msg, isError = false) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.style.background = isError ? '#3b1e2a' : '#1e2a3a';
        t.style.borderLeftColor = isError ? '#e06c75' : '#5f7ef2';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3500);
    }

    // ---------- РАБОТА С GITHUB ----------
    function decodeBase64Utf8(base64) {
        try { return decodeURIComponent(escape(atob(base64))); } catch(e) { return atob(base64); }
    }

    async function getCurrentStatus() {
        try {
            const resp = await fetch(RAW_URL, { cache: 'no-store' });
            if (!resp.ok) {
                if (resp.status === 404) return { blocked: false, time: 0 };
                throw new Error(`HTTP ${resp.status}`);
            }
            const text = await resp.text();
            if (!text || text.trim() === '') return { blocked: false, time: 0 };
            return JSON.parse(text);
        } catch(e) {
            console.warn('Ошибка получения статуса:', e);
            throw e;
        }
    }

    async function updateGitHub(blocked, timeSeconds) {
        const headers = {
            'Authorization': `token ${GITHUB_TOKEN}`,
            'Accept': 'application/vnd.github.v3+json'
        };

        let getResp = await fetch(API_URL, { headers });
        let sha = null;
        if (getResp.ok) {
            const data = await getResp.json();
            sha = data.sha;
        } else if (getResp.status !== 404) {
            throw new Error(`Не удалось получить файл: ${getResp.status}`);
        }

        const content = JSON.stringify({ blocked, time: timeSeconds }, null, 2);
        const base64 = btoa(unescape(encodeURIComponent(content)));
        const payload = {
            message: `Обновление блокировки: ${blocked ? 'заблокирован' : 'свободен'}`,
            content: base64,
            branch: BRANCH
        };
        if (sha) payload.sha = sha;

        const putResp = await fetch(API_URL, {
            method: 'PUT',
            headers: { ...headers, 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (!putResp.ok) {
            const err = await putResp.text();
            throw new Error(`Ошибка записи: ${putResp.status} ${err}`);
        }
        return await putResp.json();
    }

    // ---------- ОБНОВЛЕНИЕ СТАТУСА В ИНТЕРФЕЙСЕ ----------
    async function refreshStatus() {
        try {
            const data = await getCurrentStatus();
            if (data && data.blocked === true) {
                const minutes = Math.floor(data.time / 60);
                statusValue.textContent = `🔒 Заблокирован (${minutes} мин)`;
                statusValue.className = 'status-value locked';
                statusBadge.textContent = '🔒 Заблокирован';
                statusBadge.className = 'badge badge-locked';
            } else {
                statusValue.textContent = '✅ Свободен';
                statusValue.className = 'status-value free';
                statusBadge.textContent = '✅ Свободен';
                statusBadge.className = 'badge badge-free';
            }
            addLog(`Статус обновлён: ${data?.blocked ? 'заблокирован' : 'свободен'}`, 'info');
        } catch (err) {
            statusValue.textContent = '⚠️ Ошибка';
            statusValue.className = 'status-value';
            addLog(`Ошибка получения статуса: ${err.message}`, 'error');
            showToast(`Не удалось проверить статус: ${err.message}`, true);
        }
    }

    // ---------- ОБРАБОТЧИК БЛОКИРОВКИ ----------
    async function handleBlock() {
        const minutes = parseInt(minutesInput.value);
        if (isNaN(minutes) || minutes < 1) {
            showToast('Введите корректное время (больше 0)', true);
            return;
        }
        const seconds = minutes * 60;

        blockBtn.disabled = true;
        blockBtn.textContent = '⏳ Отправка...';
        addLog(`Отправка команды на блокировку на ${minutes} мин...`, 'info');

        try {
            await updateGitHub(true, seconds);
            showToast(`✅ Команда отправлена! ПК заблокируется на ${minutes} минут.`, false);
            addLog(`✅ Блокировка успешно записана в GitHub`, 'info');
            await refreshStatus();
        } catch (err) {
            showToast(`❌ Ошибка: ${err.message}`, true);
            addLog(`❌ Ошибка: ${err.message}`, 'error');
        } finally {
            blockBtn.disabled = false;
            blockBtn.textContent = '🔒 Заблокировать';
        }
    }

    // ---------- ИНИЦИАЛИЗАЦИЯ ----------
    async function init() {
        addLog('Загрузка текущего статуса...', 'info');
        try {
            await refreshStatus();
            setInterval(refreshStatus, 30000); // обновление каждые 30 сек
        } catch (e) {
            showToast('Не удалось загрузить начальный статус', true);
            addLog(`Ошибка инициализации: ${e.message}`, 'error');
        }

        // Обработчики
        document.getElementById('blockBtn').addEventListener('click', handleBlock);
        statusCard.addEventListener('dblclick', async () => {
            addLog('Обновление статуса вручную...', 'info');
            await refreshStatus();
            showToast('Статус обновлён', false);
        });
    }

    window.onload = init;
</script>
</body>
</html>
