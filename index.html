<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🔒 Блокировка ПК</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        /* Светлый фон */
        body {
            background: linear-gradient(145deg, #eef2f7 0%, #d9e2ef 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a1a2e;
        }

        .container {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
        }

        /* Карточки — белые с тенью */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 24px 20px;
            margin-bottom: 18px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
        }

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1a2a4a;
            background: none;
            -webkit-text-fill-color: #1a2a4a;
        }

        .badge {
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            background: #e8ecf5;
            color: #2a3a5a;
            letter-spacing: 0.3px;
        }

        .badge.free {
            background: #d4edda;
            color: #155724;
        }

        .badge.locked {
            background: #f8d7da;
            color: #721c24;
        }

        /* Статус */
        .status-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
        }

        .status-label {
            font-size: 1rem;
            opacity: 0.7;
            color: #2a3a5a;
        }

        .status-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .status-value.free {
            color: #28a745;
        }

        .status-value.locked {
            color: #dc3545;
        }

        .status-hint {
            font-size: 0.7rem;
            opacity: 0.5;
            margin-top: 8px;
            display: block;
            color: #3a4a6a;
        }

        /* Поле ввода */
        .input-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 12px 0 8px;
        }

        .input-row label {
            font-weight: 500;
            font-size: 0.95rem;
            white-space: nowrap;
            color: #1a2a4a;
        }

        .input-row input {
            background: #f0f4fc;
            border: 1px solid #ccd8e8;
            border-radius: 40px;
            padding: 10px 16px;
            color: #1a1a2e;
            font-size: 1.1rem;
            width: 100px;
            text-align: center;
            outline: none;
            transition: border 0.2s;
        }

        .input-row input:focus {
            border-color: #4a7aff;
        }

        /* Кнопки */
        .btn {
            background: linear-gradient(95deg, #4a6aaf, #2a4a8a);
            border: none;
            border-radius: 40px;
            padding: 14px;
            font-weight: 600;
            font-size: 1.1rem;
            color: white;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(95deg, #d42a2a, #a01818);
        }

        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(95deg, #e63a3a, #b02020);
        }

        /* Лог */
        .log-container {
            max-height: 180px;
            overflow-y: auto;
            margin-top: 6px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .log-item {
            background: rgba(240, 244, 252, 0.7);
            border-radius: 16px;
            padding: 8px 14px;
            font-size: 0.85rem;
            border-left: 3px solid #28a745;
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
            color: #1a1a2e;
        }

        .log-item.error {
            border-left-color: #dc3545;
        }

        .log-time {
            opacity: 0.6;
            font-size: 0.7rem;
            white-space: nowrap;
            color: #3a4a6a;
        }

        /* Тосты */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 20px;
            right: 20px;
            background: #ffffff;
            border-left: 5px solid #4a7aff;
            padding: 14px 20px;
            border-radius: 60px;
            text-align: center;
            font-weight: 500;
            color: #1a1a2e;
            z-index: 9999;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            animation: slideUp 0.35s ease;
        }

        .toast.error {
            border-left-color: #dc3545;
            background: #fff5f5;
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Скролл */
        .log-container::-webkit-scrollbar {
            width: 4px;
        }
        .log-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .log-container::-webkit-scrollbar-thumb {
            background: #ccd8e8;
            border-radius: 10px;
        }

        /* Адаптив */
        @media (max-width: 480px) {
            .header h1 { font-size: 1.4rem; }
            .status-value { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- Шапка -->
    <div class="header">
        <h1>🔒 Блокировка ПК</h1>
        <span class="badge free" id="statusBadge">✅ Свободен</span>
    </div>

    <!-- Статус -->
    <div class="card" id="statusCard" style="cursor: pointer;">
        <div class="status-box">
            <span class="status-label">Текущий статус</span>
            <span class="status-value free" id="statusValue">Загрузка…</span>
        </div>
        <span class="status-hint">⏳ Двойной клик — обновить вручную</span>
    </div>

    <!-- Управление -->
    <div class="card">
        <div style="font-weight: 600; font-size: 1.1rem; margin-bottom: 10px; color: #1a2a4a;">⏱️ Заблокировать</div>
        <div class="input-row">
            <label for="minutesInput">Время (мин)</label>
            <input type="number" id="minutesInput" min="1" max="1440" value="60">
        </div>
        <button class="btn btn-primary" id="blockBtn">🔒 Заблокировать</button>
    </div>

    <!-- Лог -->
    <div class="card">
        <div style="font-weight: 600; font-size: 1.1rem; margin-bottom: 6px; color: #1a2a4a;">📋 Журнал</div>
        <div class="log-container" id="logContainer">
            <div class="log-item"><span class="log-time">[Система]</span> Готов к работе</div>
        </div>
    </div>

</div>

<script>
    // --------------------- КОНФИГУРАЦИЯ (ОСТАЁТСЯ БЕЗ ИЗМЕНЕНИЙ) ---------------------
    const GITHUB_TOKEN = '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';
    const REPO_OWNER = 'ShvezYT';
    const REPO_NAME = 'PCBLOCK';
    const FILE_PATH = 'pc.json';
    const BRANCH = 'main';

    const RAW_URL = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/${FILE_PATH}`;
    const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;

    // DOM
    const statusBadge = document.getElementById('statusBadge');
    const statusValue = document.getElementById('statusValue');
    const statusCard = document.getElementById('statusCard');
    const minutesInput = document.getElementById('minutesInput');
    const blockBtn = document.getElementById('blockBtn');
    const logContainer = document.getElementById('logContainer');

    // --------------------- ВСПОМОГАТЕЛЬНЫЕ ---------------------
    function addLog(message, type = 'info') {
        const time = new Date().toLocaleTimeString();
        const div = document.createElement('div');
        div.className = `log-item${type === 'error' ? ' error' : ''}`;
        div.innerHTML = `<span class="log-time">[${time}]</span> ${message}`;
        logContainer.appendChild(div);
        logContainer.scrollTop = logContainer.scrollHeight;
        if (logContainer.children.length > 50) {
            logContainer.removeChild(logContainer.firstChild);
        }
    }

    function showToast(msg, isError = false) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();

        const t = document.createElement('div');
        t.className = `toast${isError ? ' error' : ''}`;
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 4000);
    }

    // --------------------- РАБОТА С GITHUB ---------------------
    async function getCurrentStatus() {
        try {
            const resp = await fetch(RAW_URL, { cache: 'no-store' });
            if (!resp.ok) {
                if (resp.status === 404) return { blocked: false, time: 0 };
                throw new Error(`HTTP ${resp.status}`);
            }
            const text = await resp.text();
            if (!text || text.trim() === '') return { blocked: false, time: 0 };
            return JSON.parse(text);
        } catch (e) {
            console.warn('Ошибка получения статуса:', e);
            throw e;
        }
    }

    async function updateGitHub(blocked, timeSeconds) {
        const headers = {
            'Authorization': `token ${GITHUB_TOKEN}`,
            'Accept': 'application/vnd.github.v3+json'
        };

        let getResp = await fetch(API_URL, { headers });
        let sha = null;
        if (getResp.ok) {
            const data = await getResp.json();
            sha = data.sha;
        } else if (getResp.status !== 404) {
            throw new Error(`Не удалось получить файл: ${getResp.status}`);
        }

        const content = JSON.stringify({ blocked, time: timeSeconds }, null, 2);
        const base64 = btoa(unescape(encodeURIComponent(content)));
        const payload = {
            message: `Обновление блокировки: ${blocked ? 'заблокирован' : 'свободен'}`,
            content: base64,
            branch: BRANCH
        };
        if (sha) payload.sha = sha;

        const putResp = await fetch(API_URL, {
            method: 'PUT',
            headers: { ...headers, 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (!putResp.ok) {
            const errText = await putResp.text();
            throw new Error(`Ошибка записи: ${putResp.status} ${errText}`);
        }
        return await putResp.json();
    }

    // --------------------- ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ---------------------
    async function refreshStatus() {
        try {
            const data = await getCurrentStatus();
            if (data && data.blocked === true) {
                const mins = Math.floor(data.time / 60);
                statusValue.textContent = `🔒 Заблокирован (${mins} мин)`;
                statusValue.className = 'status-value locked';
                statusBadge.textContent = '🔒 Заблокирован';
                statusBadge.className = 'badge locked';
            } else {
                statusValue.textContent = '✅ Свободен';
                statusValue.className = 'status-value free';
                statusBadge.textContent = '✅ Свободен';
                statusBadge.className = 'badge free';
            }
            addLog(`Статус обновлён: ${data?.blocked ? 'заблокирован' : 'свободен'}`, 'info');
        } catch (err) {
            statusValue.textContent = '⚠️ Ошибка';
            statusValue.className = 'status-value';
            addLog(`Ошибка получения статуса: ${err.message}`, 'error');
            showToast(`Не удалось проверить статус: ${err.message}`, true);
        }
    }

    // --------------------- ОБРАБОТЧИК БЛОКИРОВКИ ---------------------
    async function handleBlock() {
        const minutes = parseInt(minutesInput.value);
        if (isNaN(minutes) || minutes < 1) {
            showToast('Введите время больше 0', true);
            return;
        }
        const seconds = minutes * 60;

        blockBtn.disabled = true;
        blockBtn.innerHTML = '⏳ Отправка…';

        addLog(`Отправка команды на блокировку на ${minutes} мин…`, 'info');

        try {
            await updateGitHub(true, seconds);
            showToast(`✅ Команда отправлена! ПК заблокируется на ${minutes} мин`);
            addLog(`✅ Блокировка успешно записана в GitHub`, 'info');
            await refreshStatus();
        } catch (err) {
            showToast(`❌ Ошибка: ${err.message}`, true);
            addLog(`❌ Ошибка: ${err.message}`, 'error');
        } finally {
            blockBtn.disabled = false;
            blockBtn.innerHTML = '🔒 Заблокировать';
        }
    }

    // --------------------- ИНИЦИАЛИЗАЦИЯ ---------------------
    async function init() {
        addLog('Загрузка статуса…', 'info');
        try {
            await refreshStatus();
            setInterval(refreshStatus, 30000);
        } catch (e) {
            showToast('Не удалось загрузить начальный статус', true);
            addLog(`Ошибка инициализации: ${e.message}`, 'error');
        }

        blockBtn.addEventListener('click', handleBlock);
        statusCard.addEventListener('dblclick', async () => {
            addLog('Ручное обновление статуса', 'info');
            await refreshStatus();
            showToast('Статус обновлён');
        });
    }

    window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
